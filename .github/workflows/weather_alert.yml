name: Weather Alert Check

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours at :17
  workflow_dispatch:           # manual trigger button in GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit forecasts.json back
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests PyJWT cryptography

      - name: Write private key
        run: python3 -c "import os; open('private.key','w').write(os.environ['LINEWORKS_PRIVATE_KEY'])"
        env:
          LINEWORKS_PRIVATE_KEY: ${{ secrets.LINEWORKS_PRIVATE_KEY }}

      - name: Write config
        run: |
          cat > config.json << 'ENDOFCONFIG'
          {
            "location": {
              "name": "Hamamatsu",
              "latitude": 34.7108,
              "longitude": 137.7261
            },
            "lineworks": {
              "client_id": "${{ secrets.LINEWORKS_CLIENT_ID }}",
              "client_secret": "${{ secrets.LINEWORKS_CLIENT_SECRET }}",
              "service_account": "${{ secrets.LINEWORKS_SERVICE_ACCOUNT }}",
              "private_key_path": "private.key",
              "bot_id": "${{ secrets.LINEWORKS_BOT_ID }}",
              "user_id": "${{ secrets.LINEWORKS_USER_ID }}"
            },
            "thresholds": {
              "weather_category_change": false,
              "temp_change_c": 0.1,
              "precipitation_change_mm": 5
            },
            "window": {
              "days_out_min": 4,
              "days_out_max": 7
            }
          }
          ENDOFCONFIG

      - name: Debug key
        run: |
          python3 - <<'PYEOF'
          k = open('private.key').read()
          print('Length:', len(k))
          print('Has newlines:', chr(10) in k)
          print('Line count:', k.count(chr(10)))
          print('First 30 chars:', repr(k[:30]))
          print('Last 30 chars:', repr(k[-30:]))
          PYEOF

      - name: Run weather alert
        run: python weather_alert.py --test-notify

      - name: Commit updated forecast state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add forecasts.json
          git diff --staged --quiet || git commit -m "chore: update forecast state [skip ci]"
          git push
